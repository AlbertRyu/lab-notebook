services:
  lab-notebook:
    build: .
    container_name: lab-notebook
    ports:
      - "8100:8000"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - LAB_NOTEBOOK_PASSWORD=${LAB_NOTEBOOK_PASSWORD:-change-me}
      - AUTH_SECRET=${AUTH_SECRET:-change-this-secret}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_TTL_SECONDS=${AUTH_TTL_SECONDS:-28800}
      - SCAN_INTERVAL_SECONDS=${SCAN_INTERVAL_SECONDS:-30}
    restart: unless-stopped
