services:
  lab-notebook:
    build: .
    container_name: lab-notebook
    ports:
      - "8100:8000"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - LAB_NOTEBOOK_PASSWORD=${LAB_NOTEBOOK_PASSWORD:-change-me}
      - LAB_NOTEBOOK_ALLOWED_FIRST_NAMES=${LAB_NOTEBOOK_NAMES_LAB_MEMBERS:-},${LAB_NOTEBOOK_NAMES_EUROPE_COLLABORATORS:-},${LAB_NOTEBOOK_NAMES_ASIAN_COLLABORATORS:-},${LAB_NOTEBOOK_ALLOWED_FIRST_NAMES:-}
      - AUTH_SECRET=${AUTH_SECRET:-change-this-secret}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_TTL_SECONDS=${AUTH_TTL_SECONDS:-28800}
      - SCAN_INTERVAL_SECONDS=${SCAN_INTERVAL_SECONDS:-30}
      - AUTO_SCAN_ENABLED=${AUTO_SCAN_ENABLED:-true}
      - LAB_NOTEBOOK_READ_ONLY=${LAB_NOTEBOOK_READ_ONLY:-true}
    restart: unless-stopped
