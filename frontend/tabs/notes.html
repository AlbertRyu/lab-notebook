<div class="page" id="page-notes">
  <!-- Left: notes list -->
  <div id="notes-left">
    <div id="notes-header">
      <span id="notes-title">Notes</span>
      <span id="notes-source-hint" title="Notes are imported from Obsidian via scripts/import-from-obsidian.py">read-only · from Obsidian</span>
    </div>
    <div id="notes-search">
      <input id="notes-search-input" type="search" placeholder="Search notes…" oninput="notesApplySearch()" />
    </div>
    <div id="notes-list"></div>
  </div>

  <!-- Resizer -->
  <div class="resizer" data-target="notes-left"></div>

  <!-- Right: rendered markdown -->
  <div id="notes-right">
    <div id="notes-placeholder" class="placeholder" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="icon">📝</div>
      <div>Select a note to read</div>
    </div>
    <div id="notes-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div id="note-header">
        <h1 id="note-view-title"></h1>
        <div id="note-view-meta"></div>
      </div>
      <div id="note-render"></div>
    </div>
  </div>
</div>
