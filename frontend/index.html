<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab Notebook</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.svg" />

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/overview.css" />
    <link rel="stylesheet" href="/static/css/inventory.css" />
    <link rel="stylesheet" href="/static/css/preparations.css" />
    <link rel="stylesheet" href="/static/css/viz.css" />
    <link rel="stylesheet" href="/static/css/notes.css" />
    <link rel="stylesheet" href="/static/css/graph.css" />
    <link rel="stylesheet" href="/static/css/boxes.css" />

    <!-- Third-party libraries -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- ── Left nav ── -->
      <nav id="nav">
        <div class="nav-logo">🧪</div>
        <button class="nav-btn active" id="nav-overview"   title="Overview"              onclick="showPage('overview')">🏠<span class="nav-label">Overview</span></button>
        <button class="nav-btn"        id="nav-boxes"      title="Box Overview"           onclick="showPage('boxes')">📦<span class="nav-label">Boxes</span></button>
        <button class="nav-btn"        id="nav-preparations" title="Preparations"         onclick="showPage('preparations')">🧭<span class="nav-label">Preparations</span></button>
        <button class="nav-btn"        id="nav-inventory"  title="Sample Inventory"       onclick="showPage('inventory')">📋<span class="nav-label">Inventory</span></button>
        <button class="nav-btn"        id="nav-viz"        title="Data Visualization"     onclick="showPage('viz')">📈<span class="nav-label">Visualization</span></button>
        <button class="nav-btn"        id="nav-notes"      title="Notes"                  onclick="showPage('notes')">📝<span class="nav-label">Notes</span></button>
        <button class="nav-btn"        id="nav-graph"      title="Entity Graph"           onclick="showPage('graph')">🕸️<span class="nav-label">Entity Graph</span></button>
        <div class="spacer"></div>
        <button class="nav-btn nav-toggle" title="Expand sidebar" onclick="toggleNav()">›</button>
        <div class="nav-bottom">
          <button class="nav-btn" id="nav-auth" onclick="openAuthModal()">🔒<span class="nav-label">Auth</span></button>
          <button class="nav-btn" title="Toggle Theme" onclick="toggleTheme()">🌓</button>
        </div>
      </nav>

      <!-- ── Pages (tab HTML is injected here by main.js on DOMContentLoaded) ── -->
      <div id="pages"></div>
    </div>
    <!-- /app -->

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
      <button id="lightbox-close" onclick="closeLightbox()">✕</button>
      <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
    </div>

    <!-- @mention dropdown -->
    <div id="mention-dropdown"></div>

    <!-- Modal -->
    <div id="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3 id="modal-title">Add Sample</h3>
        <div id="modal-body"></div>
        <div class="form-actions">
          <button onclick="closeModal()">Cancel</button>
          <button class="primary" id="modal-submit">Save</button>
        </div>
      </div>
    </div>

    <!-- App scripts (order matters — main.js references functions from the others) -->
    <script src="/static/js/overview.js"></script>
    <script src="/static/js/inventory.js"></script>
    <script src="/static/js/preparations.js"></script>
    <script src="/static/js/viz.js"></script>
    <script src="/static/js/notes.js"></script>
    <script src="/static/js/graph.js"></script>
    <script src="/static/js/boxes.js"></script>
    <script src="/static/js/main.js"></script>
  </body>
</html>
