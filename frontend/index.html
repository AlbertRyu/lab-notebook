<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab Notebook</title>
    <script
      src="https://cdn.plot.ly/plotly-2.35.2.min.js"
      charset="utf-8"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <style>
      /* ── Theme variables ── */
      :root {
        --bg: #ffffff;
        --bg-panel: #f7f7f8;
        --bg-header: #efefef;
        --fg: #111111;
        --fg-dim: #555555;
        --fg-muted: #999999;
        --border: #e0e0e0;
        --border-strong: #cccccc;
        --accent: #2563eb;
        --accent-fg: #ffffff;
        --accent-hover: #1d4ed8;
        --row-hover: #f0f4ff;
        --row-selected: #dbeafe;
        --bg-btn: #f5f5f5;
        --bg-btn-hover: #ebebeb;
        --radius: 5px;
        --nav-w: 52px;
        --tag-microscopy: #7c3aed;
        --tag-pxrd: #0891b2;
        --tag-sxrd: #0f766e;
        --tag-ppms-vsm: #b45309;
        --tag-ppms-hc: #92400e;
        --danger: #dc2626;
      }
      [data-theme="dark"] {
        --bg: #18181b;
        --bg-panel: #1e1e21;
        --bg-header: #27272a;
        --fg: #e4e4e7;
        --fg-dim: #a1a1aa;
        --fg-muted: #71717a;
        --border: #3f3f46;
        --border-strong: #52525b;
        --accent: #3b82f6;
        --accent-fg: #ffffff;
        --accent-hover: #2563eb;
        --row-hover: #27272a;
        --row-selected: #1e3a5f;
        --bg-btn: #3f3f46;
        --bg-btn-hover: #52525b;
        --tag-microscopy: #a78bfa;
        --tag-pxrd: #22d3ee;
        --tag-sxrd: #2dd4bf;
        --tag-ppms-vsm: #fbbf24;
        --tag-ppms-hc: #fb923c;
        --danger: #f87171;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family: "Segoe UI", system-ui, Arial, sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--fg);
      }

      /* ── App shell ── */
      #app {
        display: flex;
        height: 100%;
        overflow: hidden;
      }

      /* ── Left nav ── */
      #nav {
        width: var(--nav-w);
        flex-shrink: 0;
        background: var(--bg-header);
        border-right: 1px solid var(--border-strong);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8px 0;
        gap: 4px;
        z-index: 10;
      }
      #nav .nav-logo {
        font-size: 18px;
        margin-bottom: 8px;
        color: var(--accent);
        font-weight: 900;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .nav-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
        color: var(--fg-muted);
        transition:
          background 0.12s,
          color 0.12s;
        border: none;
        background: none;
        position: relative;
      }
      .nav-btn:hover {
        background: var(--row-hover);
        color: var(--fg);
      }
      .nav-btn.active {
        background: var(--row-selected);
        color: var(--accent);
      }
      .nav-btn title {
        display: none;
      }
      #nav .spacer {
        flex: 1;
      }
      #nav .nav-bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      /* ── Pages ── */
      #pages {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .page {
        display: none;
        flex: 1;
        overflow: hidden;
        flex-direction: column;
      }
      .page.active {
        display: flex;
      }

      /* ── Page header ── */
      .page-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        background: var(--bg-header);
        border-bottom: 1px solid var(--border-strong);
        flex-shrink: 0;
      }
      .page-header h2 {
        font-size: 13px;
        font-weight: 700;
        color: var(--fg);
        margin-right: 4px;
      }
      .page-header .sep {
        flex: 1;
      }

      /* ── Shared components ── */
      button {
        padding: 5px 11px;
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
        background: var(--bg-btn);
        color: var(--fg);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        white-space: nowrap;
        transition: background 0.12s;
      }
      button:hover {
        background: var(--bg-btn-hover);
      }
      button:active {
        opacity: 0.75;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      body.readonly .auth-write {
        display: none !important;
      }
      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
      }
      button.primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }
      button.danger {
        color: var(--danger);
        border-color: var(--danger);
      }
      button.danger:hover {
        background: color-mix(in srgb, var(--danger) 10%, transparent);
      }

      input,
      textarea,
      select {
        padding: 5px 8px;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        color: var(--fg);
        font-size: 12.5px;
        font-family: inherit;
        outline: none;
      }
      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--accent);
      }

      .placeholder {
        padding: 40px;
        text-align: center;
        color: var(--fg-muted);
        font-size: 13px;
      }
      .placeholder .icon {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .tag {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .tag-ppms-vsm {
        background: color-mix(in srgb, var(--tag-ppms-vsm) 15%, transparent);
        color: var(--tag-ppms-vsm);
      }
      .tag-ppms-hc {
        background: color-mix(in srgb, var(--tag-ppms-hc) 15%, transparent);
        color: var(--tag-ppms-hc);
      }
      .tag-pxrd {
        background: color-mix(in srgb, var(--tag-pxrd) 15%, transparent);
        color: var(--tag-pxrd);
      }
      .tag-sxrd {
        background: color-mix(in srgb, var(--tag-sxrd) 15%, transparent);
        color: var(--tag-sxrd);
      }
      .tag-microscopy {
        background: color-mix(in srgb, var(--tag-microscopy) 15%, transparent);
        color: var(--tag-microscopy);
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* ── Resizer ── */
      .resizer {
        width: 5px;
        flex-shrink: 0;
        cursor: col-resize;
        background: var(--border-strong);
        transition: background 0.15s;
        user-select: none;
      }
      .resizer:hover,
      .resizer.dragging {
        background: var(--accent);
      }

      /* ══════════════════════════════════════════════════════════════
   PAGE 1 — INVENTORY
   ══════════════════════════════════════════════════════════════ */
      #page-inventory {
        flex-direction: row;
      }

      #inv-left {
        width: 290px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-panel);
      }
      #inv-search {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      #inv-search input {
        width: 100%;
      }
      #inv-filters {
        display: flex;
        gap: 4px;
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      #inv-filters select {
        flex: 1;
        min-width: 0;
        font-size: 11.5px;
      }
      #inv-list {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
      }
      #inv-footer {
        padding: 6px 10px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--fg-muted);
        display: flex;
        justify-content: space-between;
      }
      .sample-item {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .sample-item:hover {
        background: var(--row-hover);
      }
      .sample-item.active {
        background: var(--row-selected);
      }
      .sample-item .s-name {
        font-weight: 600;
        font-size: 12.5px;
      }
      .sample-item .s-meta {
        font-size: 11px;
        color: var(--fg-muted);
        margin-top: 2px;
      }
      .sample-item .s-tags {
        display: flex;
        gap: 4px;
        margin-top: 4px;
        flex-wrap: wrap;
      }

      #inv-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #detail-header {
        padding: 12px 18px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
      }
      #detail-header h2 {
        font-size: 16px;
        font-weight: 700;
      }
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 4px 16px;
        margin-top: 8px;
      }
      .meta-item {
        font-size: 11.5px;
        color: var(--fg-dim);
      }
      .meta-item span {
        color: var(--fg);
        font-weight: 500;
      }

      .meas-card {
        padding: 12px 14px;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .meas-card + .meas-card {
        margin-top: 8px;
      }

      /* gallery */
      .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .gallery-item {
        position: relative;
        cursor: pointer;
        padding: 8px;
        border-radius: var(--radius);
        overflow: hidden;
        border: 2px solid var(--border);
        background: var(--bg);
        transition:
          border-color 0.15s,
          transform 0.15s;
      }
      .gallery-item:hover {
        border-color: var(--accent);
        transform: scale(1.02);
      }
      .gallery-item img {
        display: block;
        width: 140px;
        height: 110px;
        object-fit: cover;
      }
      .gallery-item .img-name {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 10px;
        padding: 3px 5px;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
      }
      .gallery-item .img-del {
        display: none;
        position: absolute;
        top: 3px;
        right: 3px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 11px;
        cursor: pointer;
        padding: 0;
        line-height: 20px;
        text-align: center;
      }
      .gallery-item:hover .img-del {
        display: block;
      }
      .gallery-item .img-del:hover {
        background: var(--danger);
      }

      /* file list */
      .file-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 6px;
      }
      .file-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 5px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
        width: 100%;
      }
      .file-row .fname {
        flex: 1;
        font-family: monospace;
        font-size: 11.5px;
        white-space: normal;
        overflow-wrap: anywhere;
        line-height: 1.45;
        min-width: 0;
      }
      .file-row a {
        color: var(--accent);
        text-decoration: none;
        font-size: 11.5px;
        margin-left: auto;
      }
      .file-row a:hover {
        text-decoration: underline;
      }
      .file-row .f-del {
        color: var(--fg-muted);
        background: none;
        border: none;
        padding: 0 2px;
        font-size: 13px;
        cursor: pointer;
        align-self: flex-end;
      }
      .file-row .f-del:hover {
        color: var(--danger);
      }

      /* experiment notes inline editor */
      .exp-notes-view {
        font-size: 12px;
        color: var(--fg-dim);
        font-style: italic;
        cursor: pointer;
        min-height: 18px;
      }
      .exp-notes-view:hover {
        color: var(--fg);
      }
      .exp-notes-input {
        width: 100%;
        font-size: 12px;
        resize: vertical;
        min-height: 52px;
      }

      /* section label */
      .sec-label {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }

      /* ══════════════════════════════════════════════════════════════
   PAGE 2 — VISUALIZATION
   ══════════════════════════════════════════════════════════════ */
      #page-viz {
        flex-direction: row;
      }

      #viz-left {
        width: 320px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-panel);
      }
      #viz-toolbar {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      #viz-toolbar select {
        flex: 1;
        min-width: 80px;
        font-size: 11.5px;
      }
      #viz-table-wrap {
        flex: 1;
        overflow-y: auto;
      }

      #viz-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      #viz-table col.c-sel {
        width: 30px;
      }
      #viz-table col.c-mode {
        width: 96px;
      }
      #viz-table th {
        background: var(--bg-header);
        padding: 5px 7px;
        text-align: left;
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--fg-dim);
        border-bottom: 1px solid var(--border-strong);
        position: sticky;
        top: 0;
        z-index: 1;
      }
      #viz-table td {
        padding: 4px 7px;
        border-bottom: 1px solid var(--border);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
      }
      #viz-table tr:hover td {
        background: var(--row-hover);
      }
      #viz-table tr.selected td {
        background: var(--row-selected);
      }
      #viz-table .fname {
        font-family: monospace;
        font-size: 11px;
      }
      #viz-table .fsample {
        font-size: 10.5px;
        color: var(--fg-muted);
        display: block;
      }

      #viz-status {
        padding: 5px 10px;
        font-size: 11.5px;
        color: var(--fg-dim);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--bg-header);
        flex-shrink: 0;
        min-height: 28px;
      }
      #viz-status::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--fg-muted);
        flex-shrink: 0;
      }
      #viz-status.ready::before {
        background: #22c55e;
      }
      #viz-status.busy::before {
        background: #f59e0b;
      }
      #viz-status.error::before {
        background: #ef4444;
      }

      .mode-group {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .mode-group label {
        display: flex;
        align-items: center;
        gap: 2px;
        font-size: 11px;
        cursor: pointer;
        color: var(--fg-dim);
      }
      .mode-group label:has(input:checked) {
        color: var(--accent);
        font-weight: 600;
      }
      .mode-group input[type="radio"] {
        accent-color: var(--accent);
        cursor: pointer;
      }
      input[type="checkbox"] {
        accent-color: var(--accent);
        cursor: pointer;
        width: 14px;
        height: 14px;
      }

      #viz-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #viz-plot-toolbar {
        padding: 7px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-header);
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }
      #viz-plot {
        flex: 1;
      }

      /* ══════════════════════════════════════════════════════════════
   PAGE 3 — NOTES
   ══════════════════════════════════════════════════════════════ */
      #page-notes {
        flex-direction: row;
      }

      #notes-left {
        width: 260px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-panel);
      }
      #notes-search {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      #notes-search input {
        width: 100%;
      }
      #notes-list {
        flex: 1;
        overflow-y: auto;
      }
      .note-item {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .note-item:hover {
        background: var(--row-hover);
      }
      .note-item.active {
        background: var(--row-selected);
      }
      .note-item .n-title {
        font-weight: 600;
        font-size: 12.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .note-item .n-title-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .note-item .n-pin {
        font-size: 9px;
        font-weight: 700;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 999px;
        padding: 1px 5px;
        flex-shrink: 0;
      }
      .note-item .n-date {
        font-size: 10.5px;
        color: var(--fg-muted);
        margin-top: 2px;
      }
      .note-item .n-preview {
        font-size: 11px;
        color: var(--fg-dim);
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #notes-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #note-editor {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 16px 20px;
        gap: 10px;
      }
      #note-title-input {
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        padding: 4px 0;
        width: 100%;
        background: transparent;
        color: var(--fg);
      }
      #note-title-input:focus {
        border-bottom-color: var(--accent);
        outline: none;
      }
      #note-body-wrap {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
      }
      #note-body {
        flex: 1;
        resize: none;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.6;
        background: var(--bg);
        color: var(--fg);
      }
      #note-body:focus {
        border-color: var(--accent);
        outline: none;
      }
      #note-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-top: 6px;
        flex-shrink: 0;
      }
      #note-save-status {
        font-size: 11px;
        color: var(--fg-muted);
      }

      /* @mention autocomplete */
      #mention-dropdown {
        position: fixed;
        z-index: 500;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        max-height: 200px;
        overflow-y: auto;
        min-width: 220px;
        display: none;
      }
      .mention-option {
        padding: 7px 12px;
        cursor: pointer;
        font-size: 12.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .mention-option:hover,
      .mention-option.focused {
        background: var(--row-hover);
      }
      .mention-option .mo-type {
        font-size: 10px;
        color: var(--fg-muted);
      }

      /* @mention chip in rendered preview */
      .mention-chip {
        display: inline-block;
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        color: var(--accent);
        border-radius: 3px;
        padding: 0 4px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .mention-chip:hover {
        text-decoration: underline;
      }

      /* note rendered view — markdown prose */
      #note-render {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        line-height: 1.75;
        font-size: 13.5px;
        display: none;
      }
      #note-render h1,
      #note-render h2,
      #note-render h3,
      #note-render h4 {
        margin: 1em 0 0.4em;
        font-weight: 700;
        line-height: 1.3;
        color: var(--fg);
      }
      #note-render h1 {
        font-size: 1.5em;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.25em;
      }
      #note-render h2 {
        font-size: 1.25em;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.2em;
      }
      #note-render h3 {
        font-size: 1.1em;
      }
      #note-render p {
        margin: 0 0 0.75em;
      }
      #note-render ul,
      #note-render ol {
        margin: 0 0 0.75em 1.4em;
      }
      #note-render li {
        margin-bottom: 0.2em;
      }
      #note-render code {
        background: var(--bg-header);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 12px;
        font-family: monospace;
      }
      #note-render pre {
        background: var(--bg-header);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 12px;
        overflow-x: auto;
        margin: 0 0 0.75em;
      }
      #note-render pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 12px;
      }
      #note-render blockquote {
        border-left: 3px solid var(--accent);
        margin: 0 0 0.75em;
        padding: 4px 12px;
        color: var(--fg-dim);
      }
      #note-render a {
        color: var(--accent);
      }
      #note-render a:hover {
        text-decoration: underline;
      }
      #note-render table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 0.75em;
        font-size: 12.5px;
      }
      #note-render th,
      #note-render td {
        border: 1px solid var(--border-strong);
        padding: 5px 10px;
        text-align: left;
      }
      #note-render th {
        background: var(--bg-header);
        font-weight: 600;
      }
      #note-render hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1em 0;
      }
      #note-render p {
        margin-bottom: 8px;
      }

      #note-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .note-tab {
        padding: 5px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        color: var(--fg-dim);
      }
      .note-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ── Lightbox ── */
      #lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      #lightbox.open {
        display: flex;
      }
      #lightbox img {
        max-width: 92vw;
        max-height: 90vh;
        border-radius: 4px;
        cursor: default;
      }
      #lightbox-close {
        position: absolute;
        top: 14px;
        right: 18px;
        font-size: 22px;
        color: #fff;
        cursor: pointer;
        background: none;
        border: none;
        opacity: 0.8;
      }
      #lightbox-close:hover {
        opacity: 1;
      }

      /* ── Modal ── */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
      }
      #modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 24px;
        min-width: 360px;
        max-width: 480px;
        width: 100%;
      }
      .modal h3 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 14px;
      }
      .form-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
      }
      .form-row label {
        font-size: 11.5px;
        color: var(--fg-dim);
      }
      .form-row input,
      .form-row textarea,
      .form-row select {
        width: 100%;
      }
      .form-row textarea {
        resize: vertical;
        min-height: 60px;
      }
      .form-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ── Left nav ── -->
      <nav id="nav">
        <div class="nav-logo">🧪</div>
        <button
          class="nav-btn active"
          id="nav-inventory"
          title="Sample Inventory"
          onclick="showPage('inventory')"
        >
          📋
        </button>
        <button
          class="nav-btn"
          id="nav-viz"
          title="Data Visualization"
          onclick="showPage('viz')"
        >
          📈
        </button>
        <button
          class="nav-btn"
          id="nav-notes"
          title="Notes"
          onclick="showPage('notes')"
        >
          📝
        </button>
        <div class="spacer"></div>
        <div class="nav-bottom">
          <button class="nav-btn" id="nav-auth" onclick="openAuthModal()">
            🔒
          </button>
          <button class="nav-btn" title="Toggle Theme" onclick="toggleTheme()">
            🌓
          </button>
        </div>
      </nav>

      <!-- ── Pages ── -->
      <div id="pages">
        <!-- ══ PAGE 1: INVENTORY ══ -->
        <div class="page active" id="page-inventory">
          <!-- Left: sample list -->
          <div id="inv-left">
            <div id="inv-search">
              <input
                id="inv-search-input"
                type="search"
                placeholder="Search samples…"
                oninput="invApplyFilters()"
              />
            </div>
            <div id="inv-filters">
              <select id="inv-compound" onchange="invApplyFilters()">
                <option value="">All compounds</option>
              </select>
              <select id="inv-batch" onchange="invApplyFilters()">
                <option value="">All batches</option>
              </select>
              <select id="inv-box" onchange="invApplyFilters()">
                <option value="">All boxes</option>
              </select>
            </div>
            <div id="inv-list"></div>
            <div id="inv-footer">
              <span id="inv-count">0 samples</span>
              <span id="inv-scan-status"></span>
            </div>
          </div>
          <!-- Resizer -->
          <div class="resizer" data-target="inv-left"></div>
          <!-- Right: detail -->
          <div id="inv-right">
            <div
              id="inv-header-toolbar"
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 14px;
                background: var(--bg-header);
                border-bottom: 1px solid var(--border-strong);
                flex-shrink: 0;
              "
            >
              <span style="font-weight: 700; font-size: 13px"
                >Sample Inventory</span
              >
              <div style="flex: 1"></div>
              <button
                class="primary auth-write"
                id="inv-add-sample-btn"
                onclick="openAddSample()"
              >
                + Sample
              </button>
              <button
                class="auth-write"
                id="inv-scan-btn"
                onclick="triggerScan()"
              >
                Scan Folder
              </button>
            </div>
            <div
              id="inv-detail-placeholder"
              class="placeholder"
              style="
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
              "
            >
              <div class="icon">🔬</div>
              <div>Select a sample to view details</div>
            </div>
            <div
              id="inv-detail-view"
              style="
                display: none;
                flex: 1;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <div id="inv-detail-scroll" style="flex: 1; overflow-y: auto">
                <div id="detail-header">
                  <div
                    style="
                      display: flex;
                      align-items: flex-start;
                      justify-content: space-between;
                      gap: 12px;
                    "
                  >
                    <h2 id="detail-name"></h2>
                    <div style="display: flex; gap: 6px; flex-shrink: 0">
                      <button
                        class="auth-write"
                        id="detail-add-exp-btn"
                        onclick="openAddExperiment()"
                      >
                        + Experiment
                      </button>
                      <button
                        class="auth-write"
                        id="detail-edit-sample-btn"
                        onclick="openEditSample()"
                      >
                        Edit
                      </button>
                    </div>
                  </div>
                  <div class="meta-grid" id="detail-meta"></div>
                  <div
                    id="detail-notes"
                    style="
                      font-size: 12px;
                      color: var(--fg-dim);
                      margin-top: 6px;
                      font-style: italic;
                    "
                  ></div>
                  <!-- Sample-level photos -->
                  <div id="sample-photos" style="margin-top: 10px"></div>
                </div>
                <!-- Measurements section -->
                <div
                  id="inv-measurements"
                  style="padding: 12px 18px 18px"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ══ PAGE 2: VISUALIZATION ══ -->
        <div class="page" id="page-viz">
          <!-- Left: file picker -->
          <div id="viz-left">
            <div id="viz-toolbar">
              <select id="viz-exp-type" onchange="vizLoadFiles()">
                <option value="ppms-vsm">PPMS-VSM</option>
                <option value="ppms-hc">PPMS-HC</option>
                <option value="pxrd">PXRD</option>
                <option value="sxrd">SXRD</option>
              </select>
              <select id="viz-sample-filter" onchange="vizLoadFiles()">
                <option value="">All samples</option>
              </select>
            </div>
            <div id="viz-table-wrap">
              <table id="viz-table">
                <colgroup>
                  <col />
                  <col class="c-mode" />
                  <col class="c-sel" />
                </colgroup>
                <thead>
                  <tr>
                    <th>File</th>
                    <th>Mode</th>
                    <th>
                      <input
                        type="checkbox"
                        id="viz-select-all"
                        title="Select all"
                      />
                    </th>
                  </tr>
                </thead>
                <tbody id="viz-tbody"></tbody>
              </table>
            </div>
            <div id="viz-status">Open a data type to begin.</div>
          </div>
          <!-- Resizer -->
          <div class="resizer" data-target="viz-left"></div>
          <!-- Right: plot -->
          <div id="viz-right">
            <div id="viz-plot-toolbar">
              <span style="font-weight: 700; font-size: 13px"
                >Data Visualization</span
              >
              <div style="flex: 1"></div>
              <button
                class="primary"
                id="viz-plot-btn"
                disabled
                onclick="vizRenderPlot()"
              >
                Plot Selected
              </button>
              <button onclick="vizClearPlot()">Clear</button>
            </div>
            <div id="viz-plot"></div>
          </div>
        </div>

        <!-- ══ PAGE 3: NOTES ══ -->
        <div class="page" id="page-notes">
          <!-- Left: notes list -->
          <div id="notes-left">
            <div
              style="
                padding: 7px 10px;
                border-bottom: 1px solid var(--border);
                display: flex;
                gap: 6px;
              "
            >
              <span style="font-weight: 700; font-size: 13px; flex: 1"
                >Notes</span
              >
              <button
                class="primary auth-write"
                id="notes-add-btn"
                onclick="createNewNote()"
              >
                + Note
              </button>
            </div>
            <div id="notes-search">
              <input
                id="notes-search-input"
                type="search"
                placeholder="Search notes…"
                oninput="notesApplySearch()"
              />
            </div>
            <div id="notes-list"></div>
          </div>
          <!-- Resizer -->
          <div class="resizer" data-target="notes-left"></div>
          <!-- Right: editor -->
          <div id="notes-right">
            <div
              id="notes-placeholder"
              class="placeholder"
              style="
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
              "
            >
              <div class="icon">📝</div>
              <div>Select a note or create a new one</div>
              <div
                style="font-size: 11px; color: var(--fg-muted); margin-top: 8px"
              >
                Use @ to mention samples
              </div>
            </div>
            <div
              id="notes-editor-wrap"
              style="
                display: none;
                flex: 1;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <div id="note-tabs">
                <div
                  class="note-tab auth-write active"
                  id="note-tab-edit"
                  onclick="noteSetTab('edit')"
                >
                  Edit
                </div>
                <div
                  class="note-tab"
                  id="note-tab-preview"
                  onclick="noteSetTab('preview')"
                >
                  Preview
                </div>
                <div style="flex: 1"></div>
                <button
                  class="auth-write"
                  id="note-pin-btn"
                  style="margin: 4px 0; padding: 3px 8px"
                  onclick="noteTogglePin()"
                >
                  Pin
                </button>
                <button
                  class="danger auth-write"
                  id="note-delete-btn"
                  style="margin: 4px 8px; padding: 3px 8px"
                  onclick="deleteCurrentNote()"
                >
                  Delete
                </button>
              </div>
              <div id="note-editor">
                <input
                  id="note-title-input"
                  type="text"
                  placeholder="Note title…"
                  oninput="noteMarkDirty()"
                />
                <div id="note-body-wrap">
                  <textarea
                    id="note-body"
                    placeholder="Start writing… use @ to mention a sample or experiment."
                    oninput="
                      noteMarkDirty();
                      noteHandleMention(event);
                    "
                    onkeydown="noteHandleMentionKey(event)"
                  ></textarea>
                  <div id="note-render"></div>
                </div>
                <div id="note-footer">
                  <button
                    class="primary auth-write"
                    id="note-save-btn"
                    onclick="noteSave()"
                  >
                    Save
                  </button>
                  <span id="note-save-status"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- /pages -->
    </div>
    <!-- /app -->

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
      <button id="lightbox-close" onclick="closeLightbox()">✕</button>
      <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
    </div>

    <!-- @mention dropdown -->
    <div id="mention-dropdown"></div>

    <!-- Modal -->
    <div id="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3 id="modal-title">Add Sample</h3>
        <div id="modal-body"></div>
        <div class="form-actions">
          <button onclick="closeModal()">Cancel</button>
          <button class="primary" id="modal-submit">Save</button>
        </div>
      </div>
    </div>

    <script>
      // ═══════════════════════════════════════════════════════════════════════════
      // GLOBAL STATE & UTILS
      // ═══════════════════════════════════════════════════════════════════════════

      const auth = { authenticated: false };

      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);

      function toggleTheme() {
        const next =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        if (_vizPlotted) vizRenderPlot();
      }

      async function api(path, opts = {}) {
        const res = await fetch(path, opts);
        if (!res.ok) {
          const msg = await res.text();
          if (res.status === 401) {
            auth.authenticated = false;
            applyAuthUi();
          }
          throw new Error(msg || `HTTP ${res.status}`);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      async function authInit() {
        try {
          const me = await api("/api/auth/me");
          auth.authenticated = !!me.authenticated;
        } catch (_) {
          auth.authenticated = false;
        }
        applyAuthUi();
      }

      function applyAuthUi() {
        const lockBtn = document.getElementById("nav-auth");
        if (lockBtn) {
          lockBtn.textContent = auth.authenticated ? "🔓" : "🔒";
        }
        document.body.classList.toggle("readonly", !auth.authenticated);

        [
          "inv-add-sample-btn",
          "inv-scan-btn",
          "detail-add-exp-btn",
          "detail-edit-sample-btn",
          "notes-add-btn",
          "note-save-btn",
          "note-pin-btn",
          "note-delete-btn",
          "note-title-input",
          "note-body",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.disabled = !auth.authenticated;
        });

        const noteTabEdit = document.getElementById("note-tab-edit");
        if (noteTabEdit)
          noteTabEdit.style.display = auth.authenticated ? "" : "none";

        if (notes.current) {
          noteSetTab(auth.authenticated ? "edit" : "preview");
        }
      }

      function ensureWriteAuth() {
        if (auth.authenticated) return true;
        alert("Read-only mode. Please unlock editing with password first.");
        openAuthModal();
        return false;
      }

      function openAuthModal() {
        if (auth.authenticated) {
          authLogout();
          return;
        }
        modalOpen(
          "Unlock Editing",
          `
    <div class="form-row">
      <label>Password</label>
      <input id="auth-password" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
  `,
          async () => {
            const password = document.getElementById("auth-password").value;
            await authLogin(password);
            closeModal();
          },
        );
      }

      async function authLogin(password) {
        await api("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        auth.authenticated = true;
        applyAuthUi();
      }

      async function authLogout() {
        await api("/api/auth/logout", { method: "POST" });
        auth.authenticated = false;
        applyAuthUi();
      }

      function esc(s) {
        if (s == null) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fmtDate(iso) {
        if (!iso) return "";
        return new Date(iso).toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      // Page navigation
      function showPage(name) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("page-" + name).classList.add("active");
        document.getElementById("nav-" + name).classList.add("active");
        if (name === "viz" && !_vizLoaded) vizInit();
        if (name === "notes" && !_notesLoaded) notesInit();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeLightbox();
          closeModal();
          mentionHide();
        }
      });

      // ═══════════════════════════════════════════════════════════════════════════
      // PAGE 1 — INVENTORY
      // ═══════════════════════════════════════════════════════════════════════════

      const inv = {
        samples: [],
        current: null,
      };

      (async function invInit() {
        await authInit();
        await invLoadFilters();
        await invLoadSamples();
      })();

      async function invLoadFilters() {
        try {
          const f = await api("/api/filters");
          invPopSelect("inv-compound", f.compounds, "All compounds");
          invPopSelect("inv-batch", f.batches, "All batches");
          invPopSelect("inv-box", f.boxes, "All boxes");
        } catch (_) {}
      }

      function invPopSelect(id, values, ph) {
        const sel = document.getElementById(id);
        const cur = sel.value;
        sel.innerHTML =
          `<option value="">${ph}</option>` +
          values
            .map(
              (v) =>
                `<option value="${esc(v)}"${v === cur ? " selected" : ""}>${esc(v)}</option>`,
            )
            .join("");
      }

      async function invLoadSamples() {
        const p = new URLSearchParams();
        const q = document.getElementById("inv-search-input").value.trim();
        const compound = document.getElementById("inv-compound").value;
        const batch = document.getElementById("inv-batch").value;
        const box = document.getElementById("inv-box").value;
        if (q) p.set("q", q);
        if (compound) p.set("compound", compound);
        if (batch) p.set("batch", batch);
        if (box) p.set("box", box);
        inv.samples = await api("/api/samples?" + p);
        invRenderList();
      }

      function invApplyFilters() {
        invLoadSamples();
      }

      function invRenderList() {
        const list = document.getElementById("inv-list");
        document.getElementById("inv-count").textContent =
          `${inv.samples.length} sample${inv.samples.length !== 1 ? "s" : ""}`;
        if (!inv.samples.length) {
          list.innerHTML =
            '<div class="placeholder" style="padding:20px;text-align:center;color:var(--fg-muted);">No samples</div>';
          return;
        }
        list.innerHTML = inv.samples
          .map(
            (s) => `
    <div class="sample-item${inv.current && inv.current.id === s.id ? " active" : ""}" onclick="invSelectSample(${s.id})">
      <div class="s-name">${esc(s.name)}</div>
      <div class="s-meta">${esc(s.compound)}${s.batch ? " · " + esc(s.batch) : ""}${s.box ? " · Box " + esc(s.box) : ""}</div>
    </div>
  `,
          )
          .join("");
      }

      async function invSelectSample(id) {
        inv.current = await api(`/api/samples/${id}`);
        invRenderDetail();
        invRenderList();
      }

      function invRenderDetail() {
        const s = inv.current;
        document.getElementById("inv-detail-placeholder").style.display =
          "none";
        const dv = document.getElementById("inv-detail-view");
        dv.style.display = "flex";

        document.getElementById("detail-name").textContent = s.name;

        const items = [
          ["Compound", s.compound],
          ["Synthesized", s.synthesis_date],
          ["Batch", s.batch],
          ["Box", s.box],
          ["Crystal size", s.crystal_size],
        ].filter(([, v]) => v);
        document.getElementById("detail-meta").innerHTML = items
          .map(
            ([k, v]) =>
              `<div class="meta-item">${esc(k)}: <span>${esc(v)}</span></div>`,
          )
          .join("");
        const notesEl = document.getElementById("detail-notes");
        notesEl.textContent = s.notes || "";
        notesEl.style.display = s.notes ? "" : "none";

        // Sample-level photos
        invRenderSamplePhotos(s);

        // Measurements
        invRenderMeasurements(s);
      }

      function invRenderSamplePhotos(s) {
        const el = document.getElementById("sample-photos");
        const files = s.sample_files || [];
        el.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span class="sec-label">Sample Photos</span>
      <button class="auth-write" style="font-size:11px;padding:2px 8px;" onclick="document.getElementById('sp-upload').click()">+ Photo</button>
      <input type="file" multiple accept="image/*" id="sp-upload" style="display:none"
        onchange="invUploadSamplePhoto(${s.id},this)">
    </div>
    ${
      files.length
        ? `<div class="gallery">${files
            .map(
              (f) => `
      <div class="gallery-item">
        <img src="/files/${esc(f.path)}?v=${f.id}" alt="${esc(f.filename)}" loading="lazy"
          onclick="openLightbox('/files/${esc(f.path)}?v=${f.id}','${esc(f.filename)}')">
        <div class="img-name">${esc(f.filename)}</div>
        <button class="img-del auth-write" title="Delete" onclick="event.stopPropagation();invDeleteSamplePhoto(${s.id},${f.id})">✕</button>
      </div>`,
            )
            .join("")}</div>`
        : `<div style="font-size:12px;color:var(--fg-muted);">No photos yet</div>`
    }`;
      }

      function invRenderMeasurements(s) {
        const mSection = document.getElementById("inv-measurements");
        if (!s.experiments.length) {
          mSection.innerHTML =
            '<div class="placeholder">No experiments recorded yet</div>';
          return;
        }

        const typeLabel = {
          "ppms-vsm": "PPMS-VSM",
          "ppms-hc": "PPMS-HC",
          pxrd: "PXRD",
          sxrd: "SXRD",
          microscopy: "Microscopy",
        };

        mSection.innerHTML = `
    <div class="sec-label" style="padding:0 0 8px;">Measurements</div>
    ${s.experiments
      .map((exp) => {
        const images = exp.files.filter(
          (f) => f.file_type === "image" || f.file_type === "screenshot",
        );
        const dataFiles = exp.files.filter((f) => f.file_type === "data");
        const label = typeLabel[exp.type] || exp.type.toUpperCase();
        return `<div class="meas-card" id="meas-${exp.id}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <span class="tag tag-${exp.type}">${label}</span>
          ${exp.exp_date ? `<span style="font-size:11px;color:var(--fg-muted);">${exp.exp_date}</span>` : ""}
          <div style="flex:1"></div>
          <button class="danger auth-write" style="font-size:11px;padding:2px 8px;" onclick="invDeleteMeasurement(${exp.id})">Delete</button>
        </div>

        <!-- Notes -->
        <div style="margin-bottom:10px;">
          <div class="sec-label">Notes</div>
          <div class="exp-notes-view" id="exp-notes-view-${exp.id}"
            onclick="invStartEditNote(${exp.id})"
            title="Click to edit">${esc(exp.notes || "Click to add notes…")}</div>
          <div id="exp-notes-edit-${exp.id}" style="display:none;">
            <textarea class="exp-notes-input" id="exp-notes-ta-${exp.id}">${esc(exp.notes || "")}</textarea>
            <div style="display:flex;gap:6px;margin-top:4px;">
              <button style="font-size:11px;padding:3px 8px;" class="primary auth-write"
                onclick="invSaveNote(${exp.id})">Save</button>
              <button style="font-size:11px;padding:3px 8px;"
                onclick="invCancelNote(${exp.id})">Cancel</button>
            </div>
          </div>
        </div>

        <!-- Photos -->
        <div style="margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span class="sec-label">Photos</span>
            <button class="auth-write" style="font-size:11px;padding:2px 8px;"
              onclick="document.getElementById('ep-upload-${exp.id}').click()">+ Photo</button>
            <input type="file" multiple accept="image/*" id="ep-upload-${exp.id}" style="display:none"
              onchange="invUploadExpFile(${exp.id},'image',this)">
          </div>
          ${
            images.length
              ? `<div class="gallery">${images
                  .map(
                    (f) => `
            <div class="gallery-item">
              <img src="/files/${esc(f.path)}" alt="${esc(f.filename)}" loading="lazy"
                onclick="openLightbox('/files/${esc(f.path)}','${esc(f.filename)}')">
              <div class="img-name">${esc(f.filename)}</div>
              <button class="img-del auth-write" title="Delete"
                onclick="event.stopPropagation();invDeleteExpFile(${exp.id},${f.id})">✕</button>
            </div>`,
                  )
                  .join("")}</div>`
              : `<div style="font-size:12px;color:var(--fg-muted);">No photos</div>`
          }
        </div>

        <!-- Data files -->
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span class="sec-label">Data Files</span>
            <button class="auth-write" style="font-size:11px;padding:2px 8px;"
              onclick="document.getElementById('ed-upload-${exp.id}').click()">+ File</button>
            <input type="file" multiple id="ed-upload-${exp.id}" style="display:none"
              onchange="invUploadExpFile(${exp.id},'data',this)">
          </div>
          ${
            dataFiles.length
              ? `<div class="file-list">${dataFiles
                  .map(
                    (f) => `
            <div class="file-row">
              <span class="fname">${esc(f.filename)}</span>
              <a href="/files/${esc(f.path)}" download="${esc(f.filename)}">↓</a>
              <button class="f-del auth-write" title="Delete" onclick="invDeleteExpFile(${exp.id},${f.id})">✕</button>
            </div>`,
                  )
                  .join("")}</div>`
              : `<div style="font-size:12px;color:var(--fg-muted);">No data files</div>`
          }
        </div>
      </div>`;
      })
      .join("")}`;
      }

      async function invUploadSamplePhoto(sampleId, input) {
        if (!ensureWriteAuth()) return;
        for (const file of Array.from(input.files)) {
          const fd = new FormData();
          fd.append("file", file);
          await api(`/api/samples/${sampleId}/files`, {
            method: "POST",
            body: fd,
          });
        }
        input.value = "";
        if (inv.current) await invSelectSample(inv.current.id);
      }

      async function invDeleteSamplePhoto(sampleId, fileId) {
        if (!ensureWriteAuth()) return;
        if (!confirm("Delete this photo?")) return;
        await api(`/api/samples/${sampleId}/files/${fileId}`, {
          method: "DELETE",
        });
        if (inv.current) await invSelectSample(inv.current.id);
      }

      async function invUploadExpFile(expId, fileType, input) {
        if (!ensureWriteAuth()) return;
        for (const file of Array.from(input.files)) {
          const fd = new FormData();
          fd.append("file", file);
          await api(`/api/experiments/${expId}/files?file_type=${fileType}`, {
            method: "POST",
            body: fd,
          });
        }
        input.value = "";
        if (inv.current) await invSelectSample(inv.current.id);
      }

      async function invDeleteExpFile(expId, fileId) {
        if (!ensureWriteAuth()) return;
        if (!confirm("Delete this file?")) return;
        await api(`/api/experiments/${expId}/files/${fileId}`, {
          method: "DELETE",
        });
        if (inv.current) await invSelectSample(inv.current.id);
      }

      function invStartEditNote(expId) {
        const view = document.getElementById(`exp-notes-view-${expId}`);
        const edit = document.getElementById(`exp-notes-edit-${expId}`);
        view.style.display = "none";
        edit.style.display = "";
        document.getElementById(`exp-notes-ta-${expId}`).focus();
      }

      function invCancelNote(expId) {
        const exp = inv.current?.experiments.find((e) => e.id === expId);
        document.getElementById(`exp-notes-ta-${expId}`).value =
          exp?.notes || "";
        document.getElementById(`exp-notes-view-${expId}`).style.display = "";
        document.getElementById(`exp-notes-edit-${expId}`).style.display =
          "none";
      }

      async function invSaveNote(expId) {
        if (!ensureWriteAuth()) return;
        const exp = inv.current?.experiments.find((e) => e.id === expId);
        if (!exp) return;
        const body = document.getElementById(`exp-notes-ta-${expId}`).value;
        await api(`/api/experiments/${expId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sample_id: exp.sample_id,
            type: exp.type,
            exp_date: exp.exp_date,
            notes: body,
          }),
        });
        if (inv.current) await invSelectSample(inv.current.id);
      }

      async function invDeleteMeasurement(expId) {
        if (!ensureWriteAuth()) return;
        if (!confirm("Delete this measurement and all attached files?")) return;
        await api(`/api/experiments/${expId}`, { method: "DELETE" });
        if (inv.current) await invSelectSample(inv.current.id);
      }

      async function triggerScan() {
        if (!ensureWriteAuth()) return;
        const st = document.getElementById("inv-scan-status");
        st.textContent = "Scanning…";
        try {
          const r = await api("/api/scan", { method: "POST" });
          st.textContent = `+${r.samples}s +${r.experiments}e +${r.files}f`;
          await invLoadFilters();
          await invLoadSamples();
          if (inv.current) await invSelectSample(inv.current.id);
        } catch (e) {
          st.textContent = "Error";
        }
      }

      // ─ Add sample modal ─
      function openAddSample() {
        if (!ensureWriteAuth()) return;
        modalOpen(
          "Add Sample",
          `
    <div class="form-row"><label>Name *</label><input id="f-name" placeholder="4Br-Mn-BA-001"></div>
    <div class="form-row"><label>Compound *</label><input id="f-compound" placeholder="4Br-Mn-BA"></div>
    <div class="form-row"><label>Synthesis date</label><input id="f-date" type="date"></div>
    <div class="form-row"><label>Batch</label><input id="f-batch"></div>
    <div class="form-row"><label>Box</label><input id="f-box"></div>
    <div class="form-row"><label>Crystal size</label><input id="f-size" placeholder="0.5 x 0.3 x 0.1 mm"></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes"></textarea></div>
  `,
          async () => {
            const payload = {
              name: document.getElementById("f-name").value.trim(),
              compound: document.getElementById("f-compound").value.trim(),
              synthesis_date: document.getElementById("f-date").value || null,

              box: document.getElementById("f-box").value.trim() || null,

                document.getElementById("f-size").value.trim() || null,
              notes: document.getElementById("f-notes").value.trim() || null,
            };
            if (!payload.name || !payload.compound) return;
            await api("/api/samples", {
              method: "POST",

              body: JSON.stringify(payload),
            });
            closeModal();
            await invLoadFilters();
            await invLoadSamples();
          },
        );
      }

      function openEditSample() {
        if (!ensureWriteAuth()) return;
        const s = inv.current;
        modalOpen(
          "Edit Sample",
          `
    <div class="form-row"><label>Compound *</label><input id="f-compound" value="${esc(s.compound)}"></div>
    <div class="form-row"><label>Synthesis date</label><input id="f-date" type="date" value="${s.synthesis_date || ""}"></div>
    <div class="form-row"><label>Batch</label><input id="f-batch" value="${esc(s.batch || "")}"></div>
    <div class="form-row"><label>Box</label><input id="f-box" value="${esc(s.box || "")}"></div>
    <div class="form-row"><label>Crystal size</label><input id="f-size" value="${esc(s.crystal_size || "")}"></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes">${esc(s.notes || "")}</textarea></div>
  `,
          async () => {
            const payload = {
              name: s.name,
              compound: document.getElementById("f-compound").value.trim(),
              synthesis_date: document.getElementById("f-date").value || null,

              box: document.getElementById("f-box").value.trim() || null,
              crystal_size:
                document.getElementById("f-size").value.trim() || null,
              notes: document.getElementById("f-notes").value.trim() || null,
            };
            await api(`/api/samples/${s.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),

      }

      function openAddExperiment() {
        if (!ensureWriteAuth()) return;
        const s = inv.current;
        modalOpen(
          "Add Experiment",
          `
    <div class="form-row"><label>Type *</label>
      <select id="f-exp-type">
        <option value="ppms-vsm">PPMS-VSM</option><option value="ppms-hc">PPMS-HC</option>
        <option value="pxrd">PXRD</option><option value="sxrd">SXRD</option><option value="microscopy">Microscopy</option>
      </select>
    </div>
    <div class="form-row"><label>Date</label><input id="f-exp-date" type="date"></div>
    <div class="form-row"><label>Notes</label><textarea id="f-exp-notes"></textarea></div>
  `,
          async () => {
            const payload = {
              sample_id: s.id,
              type: document.getElementById("f-exp-type").value,
              exp_date: document.getElementById("f-exp-date").value || null,
              notes:
                document.getElementById("f-exp-notes").value.trim() || null,
            };
            await api("/api/experiments", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
