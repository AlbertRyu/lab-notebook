      // ═══════════════════════════════════════════════════════════════════════════
      // PAGE 2 — VISUALIZATION
      // ═══════════════════════════════════════════════════════════════════════════

      const viz = { files: [], selected: new Set(), fileModes: {} };
      let _vizLoaded = false,
        _vizPlotted = false;

      async function vizInit() {
        _vizLoaded = true;
        // Populate sample filter
        try {
          const samples = await api("/api/samples");
          const sel = document.getElementById("viz-sample-filter");
          sel.innerHTML =
            '<option value="">All samples</option>' +
            samples
              .map((s) => `<option value="${s.id}">${esc(s.name)}</option>`)
              .join("");
        } catch (_) {}

        document
          .getElementById("viz-select-all")
          .addEventListener("change", function () {
            document
              .querySelectorAll("#viz-tbody input[type=checkbox]")
              .forEach((cb) => {
                cb.checked = this.checked;
                cb.dispatchEvent(new Event("change"));
              });
          });

        await vizLoadFiles();
      }

      async function vizLoadFiles() {
        const type = document.getElementById("viz-exp-type").value;
        const sampleId = document.getElementById("viz-sample-filter").value;
        const p = new URLSearchParams({ exp_type: type });
        if (sampleId) p.set("sample_id", sampleId);

        vizSetStatus("Loading…", "busy");
        try {
          viz.files = await api("/api/files?" + p);
          viz.selected.clear();
          viz.fileModes = {};
          viz.files.forEach((f) => {
            viz.fileModes[f.id] = type.startsWith("ppms") ? "MH" : "";
          });
          vizRenderTable();
          vizSetStatus(
            `${viz.files.length} file${viz.files.length !== 1 ? "s" : ""} found.`,
            "ready",
          );
        } catch (e) {
          vizSetStatus("Error loading files.", "error");
        }
      }

      function vizRenderTable() {
        const tbody = document.getElementById("viz-tbody");
        document.getElementById("viz-plot-btn").disabled =
          viz.selected.size === 0;

        if (!viz.files.length) {
          tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--fg-muted);">No files</td></tr>`;
          return;
        }

        tbody.innerHTML = viz.files
          .map((f) => {
            const isPpms = document
              .getElementById("viz-exp-type")
              .value.startsWith("ppms");
            const modeCtrl = isPpms
              ? `
      <div class="mode-group">
        ${["MT", "MH"]
          .map(
            (m) => `
          <label><input type="radio" name="vm-${f.id}" value="${m}" ${viz.fileModes[f.id] === m ? "checked" : ""}
            onchange="viz.fileModes[${f.id}]='${m}'"> ${m}</label>
        `,
          )
          .join("")}
      </div>`
              : '<span style="color:var(--fg-muted);font-size:11px;">—</span>';

            return `<tr id="vrow-${f.id}" ${viz.selected.has(f.id) ? 'class="selected"' : ""}>
      <td>
        <span class="fname">${esc(f.filename)}</span>
        <span class="fsample">${esc(f.sample_name)}</span>
      </td>
      <td>${modeCtrl}</td>
      <td style="text-align:center;">
        <input type="checkbox" ${viz.selected.has(f.id) ? "checked" : ""}
          onchange="vizToggleFile(${f.id}, this.checked)">
      </td>
    </tr>`;
          })
          .join("");
      }

      function vizToggleFile(id, checked) {
        if (checked) viz.selected.add(id);
        else viz.selected.delete(id);
        document
          .getElementById("vrow-" + id)
          ?.classList.toggle("selected", checked);
        document.getElementById("viz-plot-btn").disabled =
          viz.selected.size === 0;
        vizSyncSelectAll();
      }

      function vizSyncSelectAll() {
        const cbs = Array.from(
          document.querySelectorAll("#viz-tbody input[type=checkbox]"),
        );
        const n = cbs.filter((c) => c.checked).length;
        const sa = document.getElementById("viz-select-all");
        sa.indeterminate = n > 0 && n < cbs.length;
        sa.checked = n === cbs.length && cbs.length > 0;
      }

      async function vizRenderPlot() {
        if (!viz.selected.size) return;
        vizSetStatus("Rendering…", "busy");

        const type = document.getElementById("viz-exp-type").value;
        const ids = Array.from(viz.selected);

        // Check mode consistency for PPMS
        if (type.startsWith("ppms")) {
          const modes = new Set(ids.map((id) => viz.fileModes[id]));
          if (modes.size > 1) {
            vizSetStatus(
              "Mixed modes (MT & MH) — select one mode only.",
              "error",
            );
            return;
          }
        }

        const mode = type.startsWith("ppms")
          ? viz.fileModes[ids[0]]
          : undefined;
        const p = mode ? `?mode=${mode}` : "";

        try {
          const data = await api(`/api/plot${p}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(ids),
          });
          drawPlotly(document.getElementById("viz-plot"), data);
          _vizPlotted = true;
          vizSetStatus(
            `Plotted ${ids.length} file${ids.length !== 1 ? "s" : ""}.`,
            "ready",
          );
        } catch (e) {
          vizSetStatus("Plot error: " + e.message, "error");
        }
      }

      function vizClearPlot() {
        Plotly.purge(document.getElementById("viz-plot"));
        _vizPlotted = false;
        vizSetStatus("Plot cleared.", "ready");
      }

      function vizSetStatus(msg, cls) {
        const el = document.getElementById("viz-status");
        el.textContent = msg;
        el.className = cls || "";
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // PAGE 3 — NOTES
      // ═══════════════════════════════════════════════════════════════════════════

      const notes = { list: [], current: null, dirty: false, samples: [] };
      let _notesLoaded = false;
      let _noteSaveTimer = null;

      async function notesInit() {
        _notesLoaded = true;
        notes.samples = await api("/api/samples").catch(() => []);
        await notesLoadList();
      }

      async function notesLoadList(q = "") {
        const p = q ? "?q=" + encodeURIComponent(q) : "";
        notes.list = await api("/api/notes" + p).catch(() => []);
        notesRenderList();
      }

      function notesRenderList() {
        const list = document.getElementById("notes-list");
        if (!notes.list.length) {
          list.innerHTML =
            '<div class="placeholder" style="padding:20px;text-align:center;color:var(--fg-muted);">No notes yet</div>';
          return;
        }
        list.innerHTML = notes.list
          .map(
            (n) => `
    <div class="note-item${notes.current && notes.current.id === n.id ? " active" : ""}" onclick="notesSelect(${n.id})">
      <div class="n-title-row">
        <div class="n-title">${esc(n.title) || '<em style="color:var(--fg-muted)">Untitled</em>'}</div>
        ${n.pinned ? '<span class="n-pin">PIN</span>' : ""}
      </div>
      <div class="n-date">${fmtDate(n.updated_at)}</div>
      <div class="n-preview">${esc(notesStripMentions(n.body).slice(0, 80))}</div>
    </div>`,
          )
          .join("");
      }

      function notesStripMentions(body) {
        return (body || "")
          .replace(/@\[([^\]]+)\]\([^)]+\)/g, "@$1")
          .replace(/@(\S+)/g, "@$1");
      }

      async function notesSelect(id) {
        if (notes.dirty && !confirm("Discard unsaved changes?")) return;
        notes.current = await api(`/api/notes/${id}`);
        notes.dirty = false;
        notesRenderEditor();
        notesRenderList();
      }

      function notesRenderEditor() {
        const n = notes.current;
        document.getElementById("notes-placeholder").style.display = "none";
        document.getElementById("notes-editor-wrap").style.display = "flex";
        document.getElementById("note-title-input").value = n.title || "";
        document.getElementById("note-body").value = n.body || "";
        document.getElementById("note-pin-btn").textContent = n.pinned
          ? "Unpin"
          : "Pin";
        document.getElementById("note-save-status").textContent = "";
        noteSetTab(auth.authenticated ? "edit" : "preview");
      }

      async function noteTogglePin() {
        if (!ensureWriteAuth()) return;
        if (!notes.current) return;
        clearTimeout(_noteSaveTimer);
        const title =
          document.getElementById("note-title-input").value.trim() ||
          "Untitled";
        const body = document.getElementById("note-body").value;
        const pinned = !notes.current.pinned;
        try {
          const updated = await api(`/api/notes/${notes.current.id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, body, pinned }),
          });
          notes.current = updated;
          notes.dirty = false;
          document.getElementById("note-save-status").textContent = pinned
            ? "Pinned"
            : "Unpinned";
          await notesLoadList(
            document.getElementById("notes-search-input").value.trim(),
          );
          notesRenderEditor();
        } catch (e) {
          document.getElementById("note-save-status").textContent =
            "Pin failed";
        }
      }

      async function createNewNote() {
        if (!ensureWriteAuth()) return;
        if (notes.dirty && !confirm("Discard unsaved changes?")) return;
        const n = await api("/api/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: "New note", body: "" }),
        });
        notes.list.unshift(n);
        notes.current = n;
        notes.dirty = false;
        notesRenderList();
        notesRenderEditor();
        setTimeout(
          () => document.getElementById("note-title-input").focus(),
          50,
        );
      }

      function noteMarkDirty() {
        notes.dirty = true;
        document.getElementById("note-save-status").textContent = "● unsaved";
        clearTimeout(_noteSaveTimer);
        _noteSaveTimer = setTimeout(noteSave, 2000); // autosave after 2s idle
      }

      async function noteSave() {
        if (!ensureWriteAuth()) return;
        if (!notes.current) return;
        clearTimeout(_noteSaveTimer);
        const title =
          document.getElementById("note-title-input").value.trim() ||
          "Untitled";
        const body = document.getElementById("note-body").value;
        try {
          const updated = await api(`/api/notes/${notes.current.id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, body }),
          });
          notes.current = updated;
          notes.dirty = false;
          document.getElementById("note-save-status").textContent = "Saved";
          setTimeout(() => {
            if (
              document.getElementById("note-save-status").textContent ===
              "Saved"
            )
              document.getElementById("note-save-status").textContent = "";
          }, 2000);
          // Update list entry
          const idx = notes.list.findIndex((n) => n.id === updated.id);
          if (idx >= 0) notes.list[idx] = updated;
          else notes.list.unshift(updated);
          notesRenderList();
        } catch (e) {
          document.getElementById("note-save-status").textContent =
            "Save failed";
        }
      }

      async function deleteCurrentNote() {
        if (!ensureWriteAuth()) return;
        if (!notes.current) return;
        if (!confirm(`Delete "${notes.current.title}"?`)) return;
        clearTimeout(_noteSaveTimer);
        await api(`/api/notes/${notes.current.id}`, { method: "DELETE" });
        notes.list = notes.list.filter((n) => n.id !== notes.current.id);
        notes.current = null;
        notes.dirty = false;
        document.getElementById("notes-placeholder").style.display = "flex";
        document.getElementById("notes-editor-wrap").style.display = "none";
        notesRenderList();
      }

      function notesApplySearch() {
        const q = document.getElementById("notes-search-input").value.trim();
        notesLoadList(q);
      }

      // ─ Tab switching ─
      function noteSetTab(tab) {
        const editTab = document.getElementById("note-tab-edit");
        const previewTab = document.getElementById("note-tab-preview");
        if (editTab) editTab.classList.toggle("active", tab === "edit");
        if (previewTab)
          previewTab.classList.toggle("active", tab === "preview");
        const body = document.getElementById("note-body");
        const render = document.getElementById("note-render");
        if (tab === "edit") {
          body.style.display = "";
          render.style.display = "none";
        } else {
          body.style.display = "none";
          render.style.display = "block";
          render.innerHTML = noteRenderBody(
            document.getElementById("note-body").value,
          );
        }
      }

      function noteRenderBody(text) {
        if (!text)
          return '<p style="color:var(--fg-muted)">Nothing written yet.</p>';

        // 1. Extract @[label](sample:id) mentions before Markdown parsing
        //    so marked.js doesn't mangle the custom syntax.
        const chips = [];
        const ph = (i) => `\x00CHIP${i}\x00`;
        let safe = text.replace(
          /@\[([^\]]+)\]\(sample:(\d+)\)/g,
          (_, label, id) => {
            const i = chips.length;
            chips.push(
              `<span class="mention-chip" onclick="invJumpTo(${id})">@${esc(label)}</span>`,
            );
            return ph(i);
          },
        );

        // 2. Render Markdown
        let html = marked.parse(safe, { breaks: true, gfm: true });

        // 3. Re-insert mention chips
        chips.forEach((chip, i) => {
          html = html.split(ph(i)).join(chip);
        });

        return html;
      }

      // Jump to sample from note @mention
      function invJumpTo(sampleId) {
        showPage("inventory");
        invSelectSample(sampleId);
      }

      // ─ @mention autocomplete ─
      let _mentionStart = -1;

      function noteHandleMention(e) {
        const ta = document.getElementById("note-body");
        const pos = ta.selectionStart;
        const text = ta.value;

        // Find the @ that started this mention word
        let atPos = -1;
        for (let i = pos - 1; i >= 0; i--) {
          if (text[i] === "@") {
            atPos = i;
            break;
          }
          if (text[i] === " " || text[i] === "\n") break;
        }

        if (atPos === -1) {
          mentionHide();
          return;
        }

        _mentionStart = atPos;
        const query = text.slice(atPos + 1, pos).toLowerCase();
        const matches = notes.samples
          .filter((s) => s.name.toLowerCase().includes(query))
          .slice(0, 8);

        if (!matches.length) {
          mentionHide();
          return;
        }

        // Position dropdown near cursor
        const coords = getCaretCoords(ta, atPos);
        const dd = document.getElementById("mention-dropdown");
        dd.style.display = "block";
        dd.style.left = coords.x + "px";
        dd.style.top = coords.y + "px";
        dd.innerHTML = matches
          .map(
            (s, i) => `
    <div class="mention-option${i === 0 ? " focused" : ""}" data-id="${s.id}" data-name="${esc(s.name)}"
         onclick="mentionInsert(${s.id}, '${esc(s.name)}')">
      <span>@${esc(s.name)}</span>
      <span class="mo-type">${esc(s.compound || "")}</span>
    </div>`,
          )
          .join("");
      }

      function noteHandleMentionKey(e) {
        const dd = document.getElementById("mention-dropdown");
        if (dd.style.display === "none" || !dd.children.length) return;
        if (e.key === "ArrowDown" || e.key === "ArrowUp") {
          e.preventDefault();
          const focused = dd.querySelector(".focused");
          const items = Array.from(dd.children);
          const idx = items.indexOf(focused);
          items.forEach((i) => i.classList.remove("focused"));
          const next =
            e.key === "ArrowDown"
              ? (idx + 1) % items.length
              : (idx - 1 + items.length) % items.length;
          items[next].classList.add("focused");
        } else if (e.key === "Enter" || e.key === "Tab") {
          const focused = dd.querySelector(".focused");
          if (focused) {
            e.preventDefault();
            mentionInsert(parseInt(focused.dataset.id), focused.dataset.name);
          }
        } else if (e.key === "Escape") {
          mentionHide();
        }
      }

      function mentionInsert(id, name) {
        const ta = document.getElementById("note-body");
        const pos = ta.selectionStart;
        const text = ta.value;
        const before = text.slice(0, _mentionStart);
        const after = text.slice(pos);
        const insert = `@[${name}](sample:${id})`;
        ta.value = before + insert + after;
        const newPos = before.length + insert.length;
        ta.setSelectionRange(newPos, newPos);
        mentionHide();
        noteMarkDirty();
      }

      function mentionHide() {
        document.getElementById("mention-dropdown").style.display = "none";
      }

      // Approximate caret pixel position in textarea
      function getCaretCoords(ta, pos) {
        const div = document.createElement("div");
        const style = window.getComputedStyle(ta);
        [
          "fontFamily",
          "fontSize",
          "fontWeight",
          "lineHeight",
          "padding",
          "border",
          "width",
          "boxSizing",
          "whiteSpace",
          "wordBreak",
        ].forEach((p) => {
          div.style[p] = style[p];
        });
        div.style.position = "absolute";
        div.style.visibility = "hidden";
        div.style.top = "0";
        div.style.left = "0";
        div.style.overflow = "hidden";
        div.style.height = "auto";
        div.style.whiteSpace = "pre-wrap";
        document.body.appendChild(div);
        div.textContent = ta.value.slice(0, pos);
        const span = document.createElement("span");
        span.textContent = "|";
        div.appendChild(span);
        const rect = ta.getBoundingClientRect();
        const spanRect = span.getBoundingClientRect();
        document.body.removeChild(div);
        const scrollTop = ta.scrollTop;
        return {
          x: rect.left + (spanRect.left - div.getBoundingClientRect().left),
          y:
            rect.top +
            span.offsetTop -
            scrollTop +
            parseFloat(style.lineHeight) +
            2,
        };
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // SHARED — PLOTLY HELPER
      // ═══════════════════════════════════════════════════════════════════════════

      function drawPlotly(el, data) {
        const dark =
          document.documentElement.getAttribute("data-theme") === "dark";
        const bg = dark ? "#1e1e21" : "#ffffff";
        const fg = dark ? "#cccccc" : "#222222";
        const grid = dark ? "#444444" : "#e0e0e0";
        Plotly.react(
          el,
          data.traces,
          {
            paper_bgcolor: bg,
            plot_bgcolor: bg,
            showlegend: true,
            uirevision: "plot-ui",
            font: {
              color: fg,
              family: "'Segoe UI', system-ui, Arial, sans-serif",
              size: 12,
            },
            margin: { l: 85, r: 36, t: 36, b: 72, pad: 8 },
            xaxis: {
              title: data.xaxis,
              gridcolor: grid,
              linecolor: grid,
              zerolinecolor: grid,
            },
            yaxis: {
              title: data.yaxis,
              gridcolor: grid,
              linecolor: grid,
              zerolinecolor: grid,
            },
            legend: { x: 1, xanchor: "right", y: 1 },
            hovermode: "closest",
          },
          {
            responsive: true,
            editable: false,
            displayModeBar: true,
            edits: { legendPosition: true },
          },
        );
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // SHARED — MODAL, LIGHTBOX
      // ═══════════════════════════════════════════════════════════════════════════

      let _modalSubmit = null;
      function modalOpen(title, bodyHtml, onSubmit) {
        document.getElementById("modal-title").textContent = title;
        document.getElementById("modal-body").innerHTML = bodyHtml;
        _modalSubmit = onSubmit;
        document.getElementById("modal-submit").onclick = async () => {
          try {
            await _modalSubmit();
          } catch (e) {
            alert(e.message);
          }
        };
        document.getElementById("modal-overlay").classList.add("open");
        document.querySelector("#modal-body input")?.focus();
      }
      function closeModal(e) {
        if (e && e.target !== document.getElementById("modal-overlay")) return;
        document.getElementById("modal-overlay").classList.remove("open");
      }

      function openLightbox(src, alt) {
        document.getElementById("lightbox-img").src = src;
        document.getElementById("lightbox-img").alt = alt;
        document.getElementById("lightbox").classList.add("open");
      }
      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // RESIZABLE PANELS
      // ═══════════════════════════════════════════════════════════════════════════

      (function initResizers() {
        const MIN_W = 160;
        const MAX_W = 600;
        const STORAGE_KEY = "panel-widths";

        // Restore saved widths
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          Object.entries(saved).forEach(([id, w]) => {
            const el = document.getElementById(id);
            if (el) el.style.width = w + "px";
          });
        } catch (_) {}

        document.querySelectorAll(".resizer").forEach((resizer) => {
          const targetId = resizer.dataset.target;
          const leftPanel = document.getElementById(targetId);
          if (!leftPanel) return;

          let startX, startW;

          resizer.addEventListener("mousedown", (e) => {
            e.preventDefault();
            startX = e.clientX;
            startW = leftPanel.getBoundingClientRect().width;
            resizer.classList.add("dragging");
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";

            function onMove(e) {
              const dx = e.clientX - startX;
              const newW = Math.min(MAX_W, Math.max(MIN_W, startW + dx));
              leftPanel.style.width = newW + "px";
            }

            function onUp() {
              resizer.classList.remove("dragging");
              document.body.style.cursor = "";
              document.body.style.userSelect = "";
              document.removeEventListener("mousemove", onMove);
              document.removeEventListener("mouseup", onUp);

              // Persist width
              try {
                const saved = JSON.parse(
                  localStorage.getItem(STORAGE_KEY) || "{}",
                );
                saved[targetId] = parseInt(leftPanel.style.width);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
              } catch (_) {}

              // Re-trigger Plotly resize if a plot is visible
              window.dispatchEvent(new Event("resize"));
            }

            document.addEventListener("mousemove", onMove);
            document.addEventListener("mouseup", onUp);
          });
        });
      })();
    </script>
  </body>
</html>
